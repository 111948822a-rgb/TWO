# Render 部署描述文件(确定性配置,避免控制台 Start Command 与 Dockerfile CMD 冲突)
# 文档: https://render.com/docs/yaml-spec
#
# 重要: 若 Render 控制台(服务 Settings)里手动填写了 "Start Command",
# 它会覆盖本文件与 Dockerfile 的 CMD,导致不可预期的启动失败。
# 如曾填过,请清空控制台 Start Command,让本文件/Dockerfile 生效。

services:
  - type: web
    name: ai-video-commerce
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 显式声明启动命令,与 Dockerfile 一致
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:${PORT:-8000} --timeout 300
    # 健康检查:前端页面挂在 "/" ,返回 200 即视为存活
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "false"
      # V17.0 极简登录系统: JWT 签名密钥
      # 由 Render 自动生成并持久化(部署/重启后保持不变), 切勿手动填写明文
      - key: JWT_SECRET_KEY
        generateValue: true
      # PORT 由 Render 自动注入,切勿写死;这里仅声明由平台同步
      - key: PORT
        sync: false
      # V17.4: 本地路径自适应,云端仍指向持久化磁盘 /data(与 disks.mountPath 一致)
      - key: AIVS_DATA_ROOT
        value: /data/db
      - key: AIVS_STORAGE_ROOT
        value: /data/storage
    # 持久化磁盘(单块):Render 每服务仅支持一块磁盘,挂载于 /data。
    # 数据库(/data/db/data.db)与所有生成文件(/data/storage/*)统一位于其下。
    # ⚠️ 务必在 Render 控制台确认该磁盘 Mount Path = /data(不能挂 /app 整盘)。
    disks:
      - name: data
        mountPath: /data
        sizeGB: 10
