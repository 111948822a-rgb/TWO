# Render 部署描述文件(确定性配置,避免控制台 Start Command 与 Dockerfile CMD 冲突)
# 文档: https://render.com/docs/yaml-spec
#
# 重要: 若 Render 控制台(服务 Settings)里手动填写了 "Start Command",
# 它会覆盖本文件与 Dockerfile 的 CMD,导致不可预期的启动失败。
# 如曾填过,请清空控制台 Start Command,让本文件/Dockerfile 生效。

services:
  - type: web
    name: ai-video-commerce
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 显式声明启动命令,与 Dockerfile CMD 一致(均走 start.sh:打印 [boot] 环境 + gunicorn)
    # 单 worker:后台 asyncio 流水线任务只存活于拉起它的 worker 进程内。
    # 多 worker(-w 2)时,处理 POST 的 worker 一旦被 Render 回收(OOM/部署/重启),
    # 在跑的任务会静默死亡(进度条永久卡死),且并发任务会争抢 SQLite 写入锁。
    # 单 worker 既消除"任务随 worker 死亡"的根因,又避免跨进程写锁竞争;
    # 配合启动自愈(拉起孤儿任务),部署/重启后任务可自动续跑。流水线为异步 IO 密集,
    # 单 worker 可在等待 API 期间正常服务前端请求,不存在阻塞问题。
    # --timeout 1200(start.sh 内):单条视频流水线(含 5 段视频生成)最长可达 ~20 分钟,
    # 避免 gunicorn 误判 worker 失活而杀掉正在跑的任务。
    startCommand: sh /app/start.sh
    # 健康检查:前端页面挂在 "/" ,返回 200 即视为存活
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "false"
      # V17.0 极简登录系统: JWT 签名密钥
      # 由 Render 自动生成并持久化(部署/重启后保持不变), 切勿手动填写明文
      - key: JWT_SECRET_KEY
        generateValue: true
      # PORT 由 Render 自动注入,切勿写死;这里仅声明由平台同步
      - key: PORT
        sync: false
      # V17.4: 本地路径自适应,云端仍指向持久化磁盘 /data(与 disks.mountPath 一致)
      - key: AIVS_DATA_ROOT
        value: /data/db
      - key: AIVS_STORAGE_ROOT
        value: /data/storage
    # 持久化磁盘(单块):Render 每服务仅支持一块磁盘,挂载于 /data。
    # 数据库(/data/db/data.db)与所有生成文件(/data/storage/*)统一位于其下。
    # ⚠️ 务必在 Render 控制台确认该磁盘 Mount Path = /data(不能挂 /app 整盘)。
    disks:
      - name: data
        mountPath: /data
        sizeGB: 10
