# 极简 docker-compose:仅启动本地 Redis 供 Celery 使用
# 启动: docker-compose up -d
# 停止: docker-compose down
# 清理数据: docker-compose down -v
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: ai_video_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
